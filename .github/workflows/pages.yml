name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AC8265: ${{ secrets.AC8265 }}
          B606A1: ${{ secrets.B606A1 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AC8265', '')
          bm = os.environ.get('B606A1', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- f3dbb4be6594a62b8b3b1a36a82c0b80c2e1d1c0 -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 9ed1839ca3d2b8622a896f373791c8b7392409f10043bc95 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
